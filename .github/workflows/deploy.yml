name: Deploy Server Manager

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run backend lint
        run: cd backend && npm run lint

      - name: Run backend tests
        run: cd backend && npm test

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend lint
        run: cd frontend && npm run lint

      - name: Build frontend
        run: cd frontend && npm run build

  docker-build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment secrets
        id: validate
        run: |
          MISSING=""
          for secret in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY; do
            if [ -z "${{ secrets[secret] }}" ]; then
              MISSING="$MISSING $secret"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi
          echo "host_ok=true" >> "$GITHUB_OUTPUT"

      - name: Resolve deployment host
        if: steps.validate.outputs.host_ok == 'true'
        run: |
          echo "Resolving DEPLOY_HOST..."
          nslookup "${{ secrets.DEPLOY_HOST }}" 2>&1 || echo "DNS resolution failed (may be private hostname)"
          echo "Trying ping -c1..."
          ping -c1 -W3 "${{ secrets.DEPLOY_HOST }}" 2>&1 || echo "Ping failed (may be firewalled)"

      - name: Deploy to production
        if: steps.validate.outputs.host_ok == 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            echo "=== Radix Deployment ==="
            echo "Host: $(hostname)"
            echo "Date: $(date)"

            cd /opt/server-manager

            echo "[1/6] Pulling latest changes..."
            git pull origin main

            echo "[2/6] Creating .env from GitHub secrets..."
            cat > .env << 'ENVEOF'
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            API_URL=${{ secrets.API_URL }}
            WS_URL=${{ secrets.WS_URL }}
            GRAFANA_USER=${{ secrets.GRAFANA_USER }}
            GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}
            ENVEOF

            echo "[3/6] Pulling latest Docker images..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            echo "[4/6] Starting services..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

            echo "[5/6] Cleaning up old images..."
            docker image prune -f

            echo "[6/6] Health check..."
            sleep 5
            curl -sf --max-time 10 http://localhost:3000/api/health 2>/dev/null && echo "Backend health: OK" || echo "Backend health: unreachable (may need more time)"

            echo "=== Deployment complete! ==="
